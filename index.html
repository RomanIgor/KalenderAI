<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#080810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Termine automatisch per Text, Foto oder Sprache in den Kalender eintragen">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<title>KalenderAI – Termine automatisch eintragen</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --surface: rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.07);
  --surfaceHover: rgba(255,255,255,0.1);
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --accent: #f55036;
  --accent2: #ff8c42;
  --accentGlow: rgba(245,80,54,0.3);
  --green: #34d399;
  --greenGlow: rgba(52,211,153,0.2);
  --red: #f87171;
  --text: #f1f0ff;
  --muted: rgba(241,240,255,0.45);
  --muted2: rgba(241,240,255,0.25);
  --font: 'Outfit', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --radius: 20px;
  --radius-sm: 12px;
  --blur: blur(20px);
}
:root.light {
  --bg: #f0effe;
  --surface: rgba(255,255,255,0.7);
  --surface2: rgba(255,255,255,0.5);
  --surfaceHover: rgba(255,255,255,0.9);
  --border: rgba(108,99,255,0.12);
  --border2: rgba(108,99,255,0.22);
  --accent: #f55036;
  --accent2: #7c3aed;
  --accentGlow: rgba(245,80,54,0.15);
  --green: #059669;
  --greenGlow: rgba(5,150,105,0.15);
  --red: #dc2626;
  --text: #1a1830;
  --muted: rgba(26,24,48,0.5);
  --muted2: rgba(26,24,48,0.3);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.4s, color 0.4s;
}

/* ── Toggles ── */
.toggle-wrap {
  display: flex;
  align-items: center;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 3px;
  gap: 2px;
  backdrop-filter: var(--blur);
}
.toggle-opt {
  height: 32px;
  border-radius: 100px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  border: none;
  background: transparent;
  transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
  color: var(--muted);
  flex-shrink: 0;
  padding: 0 10px;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  gap: 5px;
}
.toggle-opt svg { transition: all 0.3s; flex-shrink: 0; }

/* Theme toggle colors */
#theme-dark.active {
  background: linear-gradient(135deg, #1a1040, #2d1b69);
  color: #a78bfa;
  box-shadow: 0 2px 12px rgba(109,40,217,0.4);
}
#theme-light.active {
  background: linear-gradient(135deg, #fff4e0, #ffe0b2);
  color: #f59e0b;
  box-shadow: 0 2px 12px rgba(245,158,11,0.4);
}

/* Lang toggle - flag style */
.lang-toggle-wrap {
  display: flex;
  align-items: center;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 3px;
  position: relative;
  backdrop-filter: var(--blur);
  gap: 0;
}
.lang-toggle-wrap .toggle-opt {
  width: 52px; height: 32px;
  padding: 0;
  border-radius: 100px;
  position: relative;
  overflow: hidden;
  z-index: 1;
}
.lang-flag {
  position: absolute;
  inset: 0;
  border-radius: 100px;
  overflow: hidden;
  opacity: 0;
  transition: opacity 0.3s;
}
.toggle-opt.active .lang-flag { opacity: 1; }
.toggle-opt .lang-label {
  position: relative;
  z-index: 2;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.8px;
  transition: color 0.3s;
  color: var(--muted);
}
.toggle-opt.active .lang-label { color: white; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }

/* DE flag - keep CSS stripes, they look great */
.flag-de { display: flex; flex-direction: column; }
.flag-de .s1 { flex:1; background: #1a1a1a; }
.flag-de .s2 { flex:1; background: #dd0000; }
.flag-de .s3 { flex:1; background: #ffce00; }

/* EN flag - emoji */
.flag-en {
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  line-height: 1;
}

#lang-de.active { box-shadow: 0 2px 14px rgba(221,0,0,0.35); }
#lang-en.active { box-shadow: 0 2px 14px rgba(1,33,105,0.5); }

:root.light #theme-dark.active { box-shadow: 0 2px 12px rgba(109,40,217,0.25); }
:root.light #theme-light.active { box-shadow: 0 2px 12px rgba(245,158,11,0.25); }

/* ── Animated background ── */
.bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.35;
  animation: drift 20s ease-in-out infinite;
}
.orb-1 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, #f55036, transparent);
  top: -100px; left: -100px;
  animation-delay: 0s;
}
.orb-2 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, #ff8c42, transparent);
  bottom: -80px; right: -80px;
  animation-delay: -7s;
}
.orb-3 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, #34d399, transparent);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation-delay: -14s;
  opacity: 0.15;
}
:root.light .orb { opacity: 0.2; }

@keyframes drift {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(30px, -20px) scale(1.05); }
  66% { transform: translate(-20px, 30px) scale(0.95); }
}

/* ── Layout ── */
.app {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 16px 16px 40px;
  min-height: 100vh;
}

/* ── Glass card ── */
.glass {
  background: var(--surface);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0 24px;
  animation: slideDown 0.6s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: 0 4px 20px var(--accentGlow);
}
.logo-text {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--text) 60%, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-actions { display: flex; gap: 8px; align-items: center; }

.pill-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface2);
  backdrop-filter: var(--blur);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 6px 14px;
  font-size: 13px;
  font-family: var(--font);
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 500;
}
.pill-btn:hover {
  background: var(--surfaceHover);
  border-color: var(--border2);
  transform: translateY(-1px);
}

.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: pulse-dot 2s ease infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--green); }
  50% { opacity: 0.6; box-shadow: 0 0 4px var(--green); }
}

/* ── Status bar ── */

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Mode tabs ── */
.tabs {
  display: flex;
  background: var(--surface);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 4px;
  margin-bottom: 16px;
  animation: fadeIn 0.8s 0.3s both;
  gap: 2px;
}
.tab {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  flex: 1;
  padding: 10px 8px;
  border-radius: 100px;
  background: transparent;
  border: none;
  cursor: pointer;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
  letter-spacing: 0.2px;
  white-space: nowrap;
}
.tab:hover { color: var(--text); }
.tab.active {
  background: linear-gradient(135deg, var(--accent), #ff8c42);
  color: white;
  box-shadow: 0 2px 16px var(--accentGlow);
}
.tab-icon { font-size: 16px; transition: transform 0.2s; }
.tab.active .tab-icon { transform: scale(1.1); }

/* ── Input area ── */
.input-card {
  margin-bottom: 16px;
  padding: 20px;
  animation: fadeIn 0.8s 0.4s both;
  position: relative;
  overflow: hidden;
}
.input-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.5;
}
.input-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
  font-family: var(--mono);
}
textarea {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 400;
  color: var(--text);
  resize: none;
  min-height: 100px;
  line-height: 1.6;
  caret-color: var(--accent);
}
textarea::placeholder { color: var(--muted2); }

/* Photo area */
.photo-zone {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 140px;
  gap: 12px;
  cursor: pointer;
  border: 1.5px dashed var(--border2);
  border-radius: var(--radius-sm);
  padding: 24px;
  transition: all 0.2s;
}
.photo-zone:hover {
  border-color: var(--accent);
  background: rgba(108,99,255,0.05);
}
.photo-zone-icon { font-size: 36px; opacity: 0.6; }
.photo-zone-text { font-size: 14px; color: var(--muted); text-align: center; line-height: 1.5; }
.photo-preview {
  width: 100%; border-radius: var(--radius-sm);
  max-height: 220px; object-fit: cover; display: none;
}

/* Voice area */
.voice-zone {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 140px;
  gap: 16px;
}
.mic-btn {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: var(--surface2);
  border: 2px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
  position: relative;
}
.mic-btn:hover {
  transform: scale(1.08);
  border-color: var(--accent);
  box-shadow: 0 0 30px var(--accentGlow);
}
.mic-btn.recording {
  background: rgba(248,113,113,0.15);
  border-color: var(--red);
  box-shadow: 0 0 40px rgba(248,113,113,0.3);
  animation: mic-pulse 1.5s ease infinite;
}
@keyframes mic-pulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(248,113,113,0.3); }
  50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(248,113,113,0.5); }
}
.mic-rings {
  position: absolute;
  inset: -12px;
  border-radius: 50%;
  border: 2px solid var(--red);
  opacity: 0;
  pointer-events: none;
}
.mic-btn.recording .mic-rings {
  animation: ring-expand 1.5s ease infinite;
}
@keyframes ring-expand {
  from { transform: scale(0.8); opacity: 0.6; }
  to   { transform: scale(1.4); opacity: 0; }
}
.voice-status { font-size: 13px; color: var(--muted); font-weight: 500; }
.voice-transcript {
  font-size: 14px; color: var(--text);
  text-align: center; line-height: 1.6;
  padding: 0 8px; min-height: 20px;
  font-style: italic; opacity: 0.8;
}

/* ── CTA Button ── */
.btn-main {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: var(--radius-sm);
  color: white;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.3px;
  transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
  margin-bottom: 16px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 4px 30px var(--accentGlow);
  animation: fadeIn 0.8s 0.5s both;
  position: relative;
  overflow: hidden;
}
.btn-main::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
  opacity: 0;
  transition: opacity 0.2s;
}
.btn-main:hover::before { opacity: 1; }
.btn-main:hover { transform: translateY(-2px); box-shadow: 0 8px 40px var(--accentGlow); }
.btn-main:active { transform: translateY(0); }
.btn-main:disabled {
  opacity: 0.5; cursor: not-allowed; transform: none;
  box-shadow: none;
}

/* Loader bar */
.loader {
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2), var(--green));
  border-radius: 2px;
  margin-bottom: 16px;
  display: none;
  background-size: 200% 100%;
  animation: shimmer 1.5s ease infinite;
}
.loader.on { display: block; }
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ── Empty state ── */
.empty {
  text-align: center;
  padding: 32px 20px;
  color: var(--muted);
  font-size: 14px;
  display: none;
  animation: fadeIn 0.4s both;
}
.empty-icon { font-size: 44px; margin-bottom: 12px; opacity: 0.4; }
.empty-text { line-height: 1.6; }

/* ── Results ── */
.results { display: none; animation: fadeIn 0.5s both; }

.results-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
  padding: 0 4px;
}
.results-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--muted);
  font-family: var(--mono);
}
.results-count {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 100px;
  font-family: var(--mono);
}



/* ── Event cards ── */
.ev-card {
  margin-bottom: 10px;
  padding: 18px;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
  animation: cardIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
}
.ev-card:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(0,0,0,0.3); }
@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.ev-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, var(--accent), var(--accent2));
  border-radius: 3px 0 0 3px;
}

.ev-top {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 12px; gap: 10px;
}
.ev-name {
  font-size: 16px;
  font-weight: 700;
  line-height: 1.3;
  letter-spacing: -0.2px;
}
.ev-conf {
  font-size: 11px;
  font-weight: 700;
  font-family: var(--mono);
  color: var(--accent2);
  background: rgba(245,80,54,0.12);
  border: 1px solid rgba(245,80,54,0.2);
  padding: 3px 8px;
  border-radius: 100px;
  white-space: nowrap;
  flex-shrink: 0;
}

.ev-chips {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-bottom: 14px;
}
.chip {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 4px 10px;
}

.ev-desc {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 14px;
  line-height: 1.5;
  font-style: italic;
}

.ev-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }

.btn-edit {
  padding: 9px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--muted);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.2px;
  width: 100%;
}
.btn-edit:hover {
  background: var(--surfaceHover);
  color: var(--text);
  border-color: var(--border2);
}

/* Calendar export section */
.cal-export-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--muted);
  font-family: var(--mono);
  margin-bottom: 6px;
}
.cal-option-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface2);
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 6px;
  user-select: none;
}
.cal-option-card:last-of-type { margin-bottom: 0; }
.cal-option-card:hover { border-color: var(--border2); background: var(--surfaceHover); }
.cal-option-card.selected {
  border-color: var(--accent);
  background: rgba(245,80,54,0.08);
}
.cal-option-checkbox {
  width: 20px; height: 20px;
  border-radius: 6px;
  border: 2px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
  background: transparent;
}
.cal-option-card.selected .cal-option-checkbox {
  background: var(--accent);
  border-color: var(--accent);
}
.cal-option-checkbox svg { opacity: 0; transition: opacity 0.15s; }
.cal-option-card.selected .cal-option-checkbox svg { opacity: 1; }
.cal-option-icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 18px;
}
.cal-icon-google { background: rgba(234,67,53,0.12); }
.cal-icon-ics { background: rgba(245,80,54,0.12); }
.cal-option-info { flex: 1; }
.cal-option-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 2px;
}
.cal-option-desc { font-size: 11px; color: var(--muted); }

.btn-confirm-export {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, var(--accent), #ff8c42);
  border: none;
  border-radius: var(--radius-sm);
  color: white;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 2px 12px var(--accentGlow);
  margin-top: 8px;
  letter-spacing: 0.3px;
}
.btn-confirm-export:hover { transform: translateY(-1px); box-shadow: 0 6px 24px var(--accentGlow); }
.btn-confirm-export:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-confirm-export.done {
  background: linear-gradient(135deg, var(--green), #6ee7b7);
  box-shadow: 0 2px 12px var(--greenGlow);
}

/* Dropdown */
.cal-dropdown { position: relative; flex: 2; }
.cal-dropdown-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  color: white;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: space-between; gap: 6px;
  transition: all 0.2s;
  letter-spacing: 0.3px;
  box-shadow: 0 2px 12px var(--accentGlow);
}
.cal-dropdown-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px var(--accentGlow); }
.cal-dropdown-btn.done {
  background: linear-gradient(135deg, var(--green), #6ee7b7);
  box-shadow: 0 2px 12px var(--greenGlow);
}
.cal-dropdown-menu {
  position: fixed;
  background: rgba(15,13,30,0.95);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 6px;
  min-width: 220px;
  z-index: 9999;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(245,80,54,0.1);
  display: none;
}
:root.light .cal-dropdown-menu {
  background: rgba(255,255,255,0.95);
}
.cal-dropdown-menu.open {
  display: block;
  animation: menuIn 0.2s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes menuIn {
  from { opacity: 0; transform: translateY(-8px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.cal-drop-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  transition: all 0.15s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  font-family: var(--font);
  letter-spacing: 0.2px;
}
.cal-drop-item:hover { background: var(--surface2); color: var(--accent); }
.cal-drop-item .di { font-size: 20px; }

/* Pill buttons */
.cal-pill-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 10px 14px;
  border-radius: 100px;
  border: none; cursor: pointer;
  font-family: var(--font); font-size: 13px; font-weight: 700;
  transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
  margin-bottom: 6px; letter-spacing: 0.2px;
}
.cal-pill-btn:last-child { margin-bottom: 0; }
.cal-google {
  background: linear-gradient(135deg, rgba(234,67,53,0.15), rgba(66,133,244,0.15));
  border: 1px solid rgba(234,67,53,0.25);
  color: #ea4335;
}
.cal-google:hover {
  background: linear-gradient(135deg, rgba(234,67,53,0.25), rgba(66,133,244,0.2));
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(234,67,53,0.2);
}
.cal-ics {
  background: linear-gradient(135deg, rgba(245,80,54,0.12), rgba(255,140,66,0.12));
  border: 1px solid rgba(245,80,54,0.2);
  color: var(--accent);
}
.cal-ics:hover {
  background: linear-gradient(135deg, rgba(245,80,54,0.22), rgba(255,140,66,0.18));
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(245,80,54,0.2);
}

/* ── Modal ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  z-index: 100;
  display: none; align-items: flex-end; justify-content: center;
}
.overlay.open { display: flex; }

.modal {
  background: #0f0d1e;
  border: 1px solid var(--border2);
  border-radius: 24px 24px 0 0;
  padding: 28px 20px 44px;
  width: 100%; max-width: 480px;
  animation: modalUp 0.35s cubic-bezier(0.16,1,0.3,1) both;
}
:root.light .modal { background: #faf9ff; }

@keyframes modalUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}

.modal-handle {
  width: 36px; height: 4px;
  background: var(--border2);
  border-radius: 2px;
  margin: 0 auto 24px;
}
.modal-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 20px;
  letter-spacing: -0.3px;
}

.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
  font-family: var(--mono);
}
.field input, .field textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-family: var(--font);
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.field input:focus, .field textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accentGlow);
}

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.btn-save-modal {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: var(--radius-sm);
  color: white;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.2s;
  box-shadow: 0 4px 20px var(--accentGlow);
  letter-spacing: 0.3px;
}
.btn-save-modal:hover { transform: translateY(-1px); box-shadow: 0 8px 30px var(--accentGlow); }

/* ── Toast ── */
.toast-wrap {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  pointer-events: none;
}
.toast {
  background: rgba(20,18,40,0.95);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border2);
  border-radius: 100px;
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  opacity: 0;
  transform: translateY(12px);
  transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  letter-spacing: 0.2px;
}
:root.light .toast { background: rgba(255,255,255,0.95); }
.toast.show { opacity: 1; transform: translateY(0); }
.toast.err { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<script>
const BACKEND = 'https://kalenderai-backend.onrender.com';
// Keep backend awake
setInterval(() => fetch(BACKEND).catch(()=>{}), 10 * 60 * 1000);

let mode = 'text';
let events = [];
let editIdx = null;
let photoB64 = null;
let photoMime = 'image/jpeg';
let isRec = false;
let mediaRecorder = null;
let audioChunks = [];
let speech = '';

// Theme
const savedTheme = localStorage.getItem('kalenderai_theme') || 'dark';
if (savedTheme === 'light') applyTheme('light');

function applyTheme(t) {
  if (t === 'light') {
    document.documentElement.classList.add('light');
  } else {
    document.documentElement.classList.remove('light');
  }
  document.getElementById('theme-dark').classList.toggle('active', t === 'dark');
  document.getElementById('theme-light').classList.toggle('active', t === 'light');
}
function setTheme(t) {
  applyTheme(t);
  localStorage.setItem('kalenderai_theme', t);
}

function setMode(m) {
  mode = m;
  ['text','photo','voice'].forEach(x => {
    document.getElementById('tab-'+x).classList.toggle('active', x===m);
  });
  document.getElementById('text-input').style.display = m==='text' ? 'block' : 'none';
  document.getElementById('photo-zone').style.display = m==='photo' ? 'flex' : 'none';
  document.getElementById('photo-preview').style.display = 'none';
  document.getElementById('voice-zone').style.display = m==='voice' ? 'flex' : 'none';
  const label = document.querySelector('.input-label');
  updateInputLabel();
}

function onPhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = r => {
    const src = r.target.result;
    photoB64 = src.split(',')[1];
    photoMime = file.type || 'image/jpeg';
    const prev = document.getElementById('photo-preview');
    prev.src = src;
    prev.style.display = 'block';
    document.getElementById('photo-zone').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function toggleVoice() {
  if (!isRec) {
    if (!navigator.mediaDevices || !window.MediaRecorder) {
      toast(lang === 'de' ? '❌ Aufnahme wird von diesem Browser nicht unterstützt' : '❌ Recording not supported in this browser', true);
      document.getElementById('voice-status').textContent = lang === 'de' ? 'Nicht unterstützt' : 'Not supported';
      return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        await transcribeAudio(blob);
      };
      mediaRecorder.start();
      isRec = true;
      document.getElementById('mic-btn').classList.add('recording');
      document.getElementById('mic-icon').outerHTML = '<svg id="mic-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="color:var(--red)"><rect x="4" y="4" width="16" height="16" rx="3"/></svg>';
      document.getElementById('voice-status').textContent = i18n.voiceRecording;
      document.getElementById('voice-transcript').textContent = '';
    } catch(err) {
      toast('❌ Mikrofon-Zugriff verweigert', true);
    }
  } else {
    mediaRecorder?.stop();
    isRec = false;
    document.getElementById('mic-btn').classList.remove('recording');
    document.getElementById('mic-icon').outerHTML = '<svg id="mic-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>';
    document.getElementById('voice-status').textContent = i18n.voiceProcessing;
  }
}

async function transcribeAudio(blob) {
  try {
    const formData = new FormData();
    formData.append('file', blob, 'audio.webm');
    const resp = await fetch(`${BACKEND}/api/transcribe`, { method: 'POST', body: formData });
    if (!resp.ok) throw new Error(await resp.text());
    speech = await resp.text();
    document.getElementById('voice-transcript').textContent = speech;
    document.getElementById('voice-status').textContent = i18n.voiceDone;
    toast(i18n.toastVoice);
  } catch(err) {
    toast('❌ Transkription fehlgeschlagen', true);
    document.getElementById('voice-status').textContent = 'Zum Aufnehmen tippen';
  }
}

// getSysPrompt defined below after lang init

async function analyze() {
  let messages = [];
  if (mode === 'text') {
    const txt = document.getElementById('text-input').value.trim();
    if (!txt) { toast('❌ Bitte zuerst Text eingeben', true); return; }
    messages = [{ role: 'user', content: txt }];
  } else if (mode === 'photo') {
    if (!photoB64) { toast('❌ Bitte zuerst ein Foto auswählen', true); return; }
    messages = [{ role: 'user', content: [
      { type: 'image_url', image_url: { url: `data:${photoMime};base64,${photoB64}` } },
      { type: 'text', text: 'Extrahiere alle Termine aus diesem Bild und antworte im gewünschten JSON-Format.' }
    ]}];
  } else {
    if (!speech) { toast('❌ Bitte zuerst Sprache aufnehmen', true); return; }
    messages = [{ role: 'user', content: speech }];
  }

  setLoading(true);
  try {
    const resp = await fetch(`${BACKEND}/api/analyze`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode, messages: [{ role: 'system', content: getSysPrompt() }, ...messages] })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message || data.error);
    const raw = data.choices?.[0]?.message?.content || '';
    const clean = raw.replace(/```json|```/g,'').trim();
    let parsed;
    try { parsed = JSON.parse(clean); }
    catch {
      // Try to extract JSON object
      const m = clean.match(/\{[\s\S]*\}/);
      if (m) {
        try { parsed = JSON.parse(m[0]); }
        catch {
          // Try to fix common JSON issues - truncated arrays, trailing commas
          let fixed = m[0]
            .replace(/,\s*([}\]])/g, '$1')  // remove trailing commas
            .replace(/([^"\\])\n/g, '$1 ')  // remove newlines in strings
            .replace(/[\u0000-\u001F]+/g, ' '); // remove control chars
          // If events array is truncated, close it
          const openBrackets = (fixed.match(/\[/g)||[]).length;
          const closeBrackets = (fixed.match(/\]/g)||[]).length;
          const openBraces = (fixed.match(/\{/g)||[]).length;
          const closeBraces = (fixed.match(/\}/g)||[]).length;
          for (let i = 0; i < openBrackets - closeBrackets; i++) fixed += ']';
          for (let i = 0; i < openBraces - closeBraces; i++) fixed += '}';
          try { parsed = JSON.parse(fixed); }
          catch { throw new Error(lang === 'de' ? 'Ungültiges Antwortformat. Bitte erneut versuchen.' : 'Invalid response format. Please try again.'); }
        }
      } else {
        throw new Error(lang === 'de' ? 'Ungültiges Antwortformat. Bitte erneut versuchen.' : 'Invalid response format. Please try again.');
      }
    }
    // Filter out invalid events
    events = (parsed.events || []).filter(ev => ev.title && ev.date && ev.startTime);
    if (!events.length) {
      document.querySelector('.empty-text').innerHTML = i18n.noResultsText;
      document.getElementById('results').style.display = 'none';
      document.getElementById('empty').style.display = 'block';
    } else {
      showEvents();
    }
  } catch(err) {
    toast('❌ ' + (err.message || 'Unbekannter Fehler'), true);
  } finally {
    setLoading(false);
  }
}

function setLoading(on) {
  document.getElementById('loader').classList.toggle('on', on);
  const b = document.getElementById('btn-main');
  b.disabled = on;
  const modeMsg = mode === 'photo' ? i18n.analyzingPhoto : mode === 'voice' ? i18n.analyzingVoice : i18n.analyzing;
  b.innerHTML = on

function fmtDate(d) {
  if (!d) return '?';
  try { return new Date(d+'T12:00:00').toLocaleDateString(lang === 'en' ? 'en-US' : 'de-DE', {day:'numeric',month:'short',year:'numeric'}); }
  catch { return d; }
}

function confLabel(pct) {
  if (pct >= 90) return lang === 'de' ? 'Sicher' : 'Certain';
  if (pct >= 70) return lang === 'de' ? 'Wahrscheinlich' : 'Likely';
  return lang === 'de' ? 'Prüfen' : 'Verify';
}

function toggleDropdown(i, e) {
  e.stopPropagation();
  if (activeDropdownIdx === i) {
    closeAllDropdowns(); return;
  }
  closeAllDropdowns();
  activeDropdownIdx = i;
  const btn = document.getElementById('cb-' + i);
  const rect = btn.getBoundingClientRect();
  sharedMenu.style.display = 'block';
  const menuH = sharedMenu.offsetHeight;
  const spaceBelow = window.innerHeight - rect.bottom;
  if (spaceBelow >= menuH + 8) {
    sharedMenu.style.top = (rect.bottom + 6) + 'px';
  } else {
    sharedMenu.style.top = (rect.top - menuH - 6) + 'px';
  }
  sharedMenu.style.left = Math.max(8, rect.right - sharedMenu.offsetWidth) + 'px';
  sharedMenu.style.display = '';
  sharedMenu.classList.add('open');
}

function closeAllDropdowns() {
  sharedMenu.classList.remove('open');
  activeDropdownIdx = null;
}

// ── Calendar URLs ─────────────────────────────────────────────────────────────
function buildGoogleURL(ev) {
  const ds = (ev.date||'').replace(/-/g,'');
  const s = (ev.startTime||'09:00').replace(':','')+'00';
  const e = (ev.endTime||'10:00').replace(':','')+'00';
  const p = new URLSearchParams({ action:'TEMPLATE', text:ev.title||'Termin',
    dates:`${ds}T${s}/${ds}T${e}`, location:ev.location||'', details:ev.description||'' });
  return `https://calendar.google.com/calendar/render?${p}`;
}
function buildOutlookURL(ev) {
  const p = new URLSearchParams({ path:'/calendar/action/compose', rru:'addevent',
    subject:ev.title||'Termin', startdt:`${ev.date}T${ev.startTime||'09:00'}:00`,
    enddt:`${ev.date}T${ev.endTime||'10:00'}:00`, location:ev.location||'', body:ev.description||'' });
  return `https://outlook.live.com/calendar/0/deeplink/compose?${p}`;
}
function buildICS(ev) {
  const ds = (ev.date||'').replace(/-/g,'');
  const s = (ev.startTime||'09:00').replace(':','')+'00';
  const e = (ev.endTime||'10:00').replace(':','')+'00';
  const ics = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//KalenderAI//DE',
    'BEGIN:VEVENT',`DTSTART:${ds}T${s}`,`DTEND:${ds}T${e}`,
    `SUMMARY:${ev.title||'Termin'}`,`LOCATION:${ev.location||''}`,
    `DESCRIPTION:${ev.description||''}`, 'END:VEVENT','END:VCALENDAR'].join('\r\n');
  return URL.createObjectURL(new Blob([ics], {type:'text/calendar'}));
}

function addToCalendar(i, type) {
  const ev = events[i];
  if (type === 'google') {
    window.open(buildGoogleURL(ev), '_blank');
    toast(i18n.toastCalendar);
  } else {
    const a = document.createElement('a');
    a.href = buildICS(ev);
    a.download = `${(ev.title||'termin').replace(/[^a-z0-9]/gi,'_')}.ics`;
    a.click();
    toast(i18n.toastICS);
  }
  // btn marking now handled by confirmExport
}

function getSysPrompt() {
  const isEN = lang === 'en';
  const now = new Date();
  const todayStr = now.toLocaleDateString(isEN ? 'en-US' : 'de-DE', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const todayISO = now.toISOString().split('T')[0];
  const tomorrow = new Date(now); tomorrow.setDate(now.getDate()+1);
  const tomorrowISO = tomorrow.toISOString().split('T')[0];
  const dayAfter = new Date(now); dayAfter.setDate(now.getDate()+2);
  const dayAfterISO = dayAfter.toISOString().split('T')[0];

  if (isEN) {
    return `You are an assistant that extracts appointments from text, photos, and voice. Reply ONLY with valid JSON in this exact format:
{"events":[{"title":"Appointment name","date":"YYYY-MM-DD","startTime":"HH:MM","endTime":"HH:MM","location":"location or empty","description":"short description or empty","confidence":90}]}

Today is ${todayStr} (${todayISO}).
Tomorrow = ${tomorrowISO}. Day after tomorrow = ${dayAfterISO}.
- Always resolve relative dates: "tomorrow" = ${tomorrowISO}, "today" = ${todayISO}
- If no year given, use next possible future date
- If no end time given, add 1 hour to start time
- If title is unclear, use a generic name like "Appointment"
- Write ALL fields in English
- Confidence = certainty 0-100
- NEVER return undefined, null, or empty string for date/startTime/title`;
  } else {
    return `Du bist ein Assistent, der Termine aus Texten, Fotos und Sprache extrahiert. Antworte NUR mit validem JSON in diesem Format:
{"events":[{"title":"Terminname","date":"YYYY-MM-DD","startTime":"HH:MM","endTime":"HH:MM","location":"Ort oder leer","description":"kurze Beschreibung oder leer","confidence":90}]}

Heute ist ${todayStr} (${todayISO}).
Morgen = ${tomorrowISO}. Übermorgen = ${dayAfterISO}.
- Löse relative Datumsangaben immer auf: "morgen" = ${tomorrowISO}, "heute" = ${todayISO}, "übermorgen" = ${dayAfterISO}
- Wenn kein Jahr angegeben, nehme das nächste mögliche Datum in der Zukunft
- Wenn keine Endzeit angegeben, addiere 1 Stunde zur Startzeit
- Wenn der Titel unklar ist, verwende einen generischen Namen wie "Termin"
- Schreibe ALLE Felder auf Deutsch
- Confidence = Sicherheit 0-100
- Gib NIEMALS undefined, null oder leere Strings für date/startTime/title zurück`;
  }
}
