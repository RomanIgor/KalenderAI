<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#080810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Termine automatisch per Text, Foto oder Sprache in den Kalender eintragen">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<title>KalenderAI – Termine automatisch eintragen</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="bg-canvas">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🗓</div>
      <div class="logo-text">KalenderAI</div>
    </div>
    <div class="header-actions">
      <!-- Language toggle -->
      <div class="toggle-wrap lang-toggle-wrap">
        <button class="toggle-opt" id="lang-en" onclick="setLang('en')" title="English">
          <div class="lang-flag flag-en">🇬🇧</div>
          <span class="lang-label">EN</span>
        </button>
        <button class="toggle-opt active" id="lang-de" onclick="setLang('de')" title="Deutsch">
          <div class="lang-flag flag-de">
            <div class="s1"></div>
            <div class="s2"></div>
            <div class="s3"></div>
          </div>
          <span class="lang-label">DE</span>
        </button>
      </div>
      <!-- Theme toggle -->
      <div class="toggle-wrap">
        <button class="toggle-opt" id="theme-dark" onclick="setTheme('dark')" title="Dark mode">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="toggle-opt active" id="theme-light" onclick="setTheme('light')" title="Light mode">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-text" onclick="setMode('text')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      <span>Text</span>
    </button>
    <button class="tab" id="tab-photo" onclick="setMode('photo')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <span>Foto</span>
    </button>
    <button class="tab" id="tab-voice" onclick="setMode('voice')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      <span>Sprache</span>
    </button>
  </div>

  <!-- Input card -->
  <div class="glass input-card">
    <div class="input-label" id="txt-input-label">Termin beschreiben</div>

    <!-- Text -->
    <textarea id="text-input" rows="4"
      placeholder="z.B. Zahnarzt Freitag um 10:30 Uhr, Dr. Müller&#10;Team-Meeting Donnerstag 15. Mai um 14 Uhr im Konferenzraum"></textarea>

    <!-- Photo -->
    <div class="photo-zone" id="photo-zone" onclick="document.getElementById('photo-input').click()">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <div class="photo-zone-text" id="txt-photo-text">Foto aufnehmen oder aus Galerie wählen<br><span style="font-size:11px;opacity:0.6;">Einladung · Ticket · Notiz · Flyer</span></div>
      <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="onPhoto(event)">
    </div>
    <img id="photo-preview" class="photo-preview" alt="Vorschau">

    <!-- Voice -->
    <div class="voice-zone" id="voice-zone">
      <button class="mic-btn" id="mic-btn" onclick="toggleVoice()">
        <svg id="mic-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        <div class="mic-rings"></div>
      </button>
      <div class="voice-status" id="voice-status">Zum Aufnehmen tippen</div>
      <div class="voice-transcript" id="voice-transcript"></div>
    </div>
  </div>

  <!-- CTA -->
  <button class="btn-main" id="btn-main" onclick="analyze()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    Termine mit KI erkennen
  </button>

  <!-- Loader -->
  <div class="loader" id="loader"></div>

  <!-- Empty -->
  <div class="empty" id="empty">
    <div class="empty-icon">🔍</div>
    <div class="empty-text">Noch keine Termine erkannt.<br>Beschreibe einen Termin oben.</div>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="results-header">
      <div class="results-title">Erkannte Termine</div>
      <div class="results-count" id="count">0</div>
    </div>
    <div id="ev-list"></div>
  </div>

</div>

<!-- Calendar Dropdown (fixed, shared) -->
<div class="cal-dropdown-menu" id="cal-menu-shared"></div>

<!-- Edit Modal -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">✏️ Termin bearbeiten</div>
    <div class="field">
      <label>Titel</label>
      <input type="text" id="e-title">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Datum</label>
        <input type="date" id="e-date">
      </div>
      <div class="field">
        <label>Beginn</label>
        <input type="time" id="e-start">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Ende</label>
        <input type="time" id="e-end">
      </div>
      <div class="field">
        <label>Ort</label>
        <input type="text" id="e-loc">
      </div>
    </div>
    <div class="field">
      <label>Beschreibung</label>
      <textarea id="e-desc" rows="2" style="resize:none;min-height:auto;"></textarea>
    </div>
    <button class="btn-save-modal" onclick="saveEdit()">Änderungen speichern</button>
  </div>
</div>

<!-- Toast -->
<div class="toast-wrap"><div class="toast" id="toast"></div></div>

<script src="js/app.js"></script>
</body>
</html>
